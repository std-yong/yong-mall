# ================================
# Server
# ================================
server.port=8080

# ================================
# DataSource (MySQL)
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/shopping_mall?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
# 앱 시작 시 DB 테이블을 자동으로 생성/갱신 (개발 단계에서만 사용)
spring.jpa.hibernate.ddl-auto=update
# 실행되는 SQL을 콘솔에 출력 (디버깅용)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================================
# JWT
# ================================
# 비밀키: 최소 32자 이상 (운영 환경에서는 더 복잡하게)
jwt.secret=${JWT_SECRET:shopping-mall-secret-key-please-change-in-production}
# 토큰 유효 시간: 24시간 (밀리초 단위)
jwt.expiration=86400000

# ================================
# Swagger UI
# ================================
springdoc.swagger-ui.path=/swagger-ui.html
